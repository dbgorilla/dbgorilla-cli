changelog:
  categories:
    - title: New features
      labels:
        - enhancement
        - feature
    - title: Bug fixes
      labels:
        - bug
        - fix
    - title: Security
      labels:
        - security
    - title: Dependencies
      labels:
        - dependencies
    - title: Other changes
      labels:
        - "*"
  exclude:
    labels:
      - skip-changelog
