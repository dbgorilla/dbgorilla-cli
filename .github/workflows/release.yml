name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

# Serialize release runs against the same tag. A re-pushed tag (rare but
# possible during an emergency rebuild) shouldn't race two goreleaser
# invocations producing inconsistent Homebrew tap commits.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # `environment: homebrew-tap` scopes HOMEBREW_TAP_GITHUB_TOKEN to this
    # environment instead of repo-wide, and lets us add approval/protection
    # rules without re-tagging.
    environment: homebrew-tap
    permissions:
      contents: write
      # Required for cosign keyless signing + SLSA build-provenance attestation.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: "go.mod"
          cache: true
      - name: Install cosign (keyless signer via Fulcio + Rekor)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin cosign to 2.x. cosign 3.x changed sign-blob to require an
          # explicit --bundle and stopped writing detached .sig files,
          # which breaks goreleaser's default upload pattern. Until we
          # migrate the goreleaser signs config to bundle output, stay on
          # cosign 2.x where ${signature} -> .sig works as goreleaser
          # expects.
          cosign-release: "v2.6.3"
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      # SLSA build-provenance over each release binary. Independent from
      # cosign's signature (which proves who signed at release time); this
      # attestation pins WHAT was built and HOW (the workflow run).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          # goreleaser's per-build directories under dist/ are named
          # dbg_<os>_<arch>_v<arch_version>/dbg. The published asset names
          # ("dbg-{os}-{arch}") reference these files via rename at upload
          # time -- attesting the dist binaries is what we want.
          subject-path: |
            dist/dbg_darwin_amd64_v1/dbg
            dist/dbg_darwin_arm64_v8.0/dbg
            dist/dbg_linux_amd64_v1/dbg
            dist/dbg_linux_arm64_v8.0/dbg
