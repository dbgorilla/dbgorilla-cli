name: test

on:
  push:
    branches: [main, "feat/**", "release-**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          # Single Go version from go.mod. Our `go` directive is explicit
          # (1.26.x) so an oldstable matrix produces "go.mod requires 1.26"
          # compile errors. Switch to a matrix once we relax the minimum.
          go-version-file: "go.mod"
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -coverprofile=coverage.out ./...
      - name: build
        run: go build -o dbg .
