name: test

on:
  push:
    branches: [main, "feat/**", "release-**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          # Single Go version from go.mod. Our `go` directive is explicit
          # (1.26.x) so an oldstable matrix produces "go.mod requires 1.26"
          # compile errors. Switch to a matrix once we relax the minimum.
          go-version-file: "go.mod"
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -coverprofile=coverage.out ./...
      - name: build
        run: go build -o dbg .
